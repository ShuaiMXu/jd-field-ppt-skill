      <rect x="22" y="52" width="44" height="20" rx="3" class="chip-skill"/><text x="29" y="67" class="font label">SKILL</text><text x="82" y="67" class="font small">交互原型生成</text>
      <rect x="268" y="52" width="44" height="20" rx="3" class="chip-skill"/><text x="275" y="67" class="font label">SKILL</text><text x="328" y="67" class="font small">多方案分析</text>
      <rect x="514" y="52" width="44" height="20" rx="3" class="chip-skill"/><text x="521" y="67" class="font label">SKILL</text><text x="574" y="67" class="font small">高保真原型生成</text>
    </g>
    <g transform="translate(18,204)">
      <rect width="712" height="126" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="306" y="28" class="font node-title">设计细化与优化</text>
      <rect x="22" y="64" width="44" height="20" rx="3" class="chip-skill"/><text x="29" y="79" class="font label">SKILL</text><text x="82" y="79" class="font small">交互细节生成</text>
      <rect x="202" y="64" width="44" height="20" rx="3" class="chip-skill"/><text x="209" y="79" class="font label">SKILL</text><text x="262" y="79" class="font small">文案优化</text>
      <rect x="382" y="64" width="44" height="20" rx="3" class="chip-skill"/><text x="389" y="79" class="font label">SKILL</text><text x="442" y="79" class="font small">多语言匹配</text>
      <rect x="562" y="64" width="44" height="20" rx="3" class="chip-skill"/><text x="569" y="79" class="font label">SKILL</text><text x="622" y="79" class="font small">动效生成</text>
    </g>
    <g transform="translate(18,346)">
      <rect width="712" height="86" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="306" y="28" class="font node-title">运营素材生产</text>
      <rect x="22" y="54" width="44" height="20" rx="3" class="chip-work"/><text x="29" y="69" class="font label">工作流</text><text x="82" y="69" class="font small">商品图生成</text>
      <rect x="210" y="54" width="44" height="20" rx="3" class="chip-work"/><text x="217" y="69" class="font label">工作流</text><text x="270" y="69" class="font small">场景图生成</text>
      <rect x="398" y="54" width="44" height="20" rx="3" class="chip-work"/><text x="405" y="69" class="font label">工作流</text><text x="458" y="69" class="font small">ICON 生成</text>
      <rect x="586" y="54" width="44" height="20" rx="3" class="chip-work"/><text x="593" y="69" class="font label">工作流</text><text x="642" y="69" class="font small">视频生成</text>
    </g>
    <g transform="translate(18,448)">
      <rect width="712" height="78" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="306" y="28" class="font node-title">设计资源与规范</text>
      <rect x="70" y="52" width="36" height="20" rx="3" class="chip-md"/><text x="79" y="67" class="font label">MD</text><text x="124" y="67" class="font small">组件 / 样式规范</text>
      <rect x="310" y="52" width="36" height="20" rx="3" class="chip-md"/><text x="319" y="67" class="font label">MD</text><text x="364" y="67" class="font small">页面模板复用</text>
      <rect x="550" y="52" width="36" height="20" rx="3" class="chip-md"/><text x="559" y="67" class="font label">MD</text><text x="604" y="67" class="font small">品牌规范素材</text>
    </g>
