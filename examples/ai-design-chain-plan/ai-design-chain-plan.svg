<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152" role="img" aria-labelledby="title desc">
  <title id="title">AI 设计提效全链路规划</title>
  <desc id="desc">A single-page JD field PPT style diagram showing before manual design workflow, after AI-native workflow, and reusable design knowledge foundations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a12"/>
      <stop offset="0.52" stop-color="#111522"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202536"/>
      <stop offset="1" stop-color="#141827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20263a"/>
      <stop offset="1" stop-color="#121727"/>
    </linearGradient>
    <linearGradient id="panelRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b1d27"/>
      <stop offset="1" stop-color="#151925"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ca66b"/>
      <stop offset="1" stop-color="#005c43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font{font-family:"JD ZhengHei","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif}
      .title{font-size:54px;font-weight:800;fill:#ffffff;letter-spacing:0}
      .caption{font-size:22px;font-weight:700;fill:#c2c4cc}
      .muted{font-size:16px;fill:#828794;font-weight:600}
      .section{font-size:26px;font-weight:800;fill:#ffffff}
      .node-title{font-size:19px;font-weight:800;fill:#ffffff}
      .node-sub{font-size:14px;fill:#c2c4cc;font-weight:600}
      .small{font-size:13px;fill:#c2c4cc;font-weight:600}
      .tiny{font-size:12px;fill:#828794;font-weight:600}
      .label{font-size:12px;font-weight:800;fill:#ffffff}
      .stage-title{font-size:24px;font-weight:800;fill:#ffffff}
      .stage-sub{font-size:15px;fill:#c2c4cc;font-weight:600}
      .chip-skill{fill:#ff0f23}
      .chip-work{fill:#b5691a}
      .chip-md{fill:#2aa32a}
      .chip-sop{fill:#828794}
      .stroke{stroke:rgba(255,255,255,.16);stroke-width:1}
      .stroke-red{stroke:#ff0f23;stroke-width:2}
    </style>
  </defs>

  <rect width="2048" height="1152" fill="url(#bg)"/>
  <circle cx="320" cy="150" r="230" fill="#ff0f23" opacity=".10" filter="url(#glow)"/>
  <circle cx="1690" cy="820" r="270" fill="#0073ff" opacity=".08" filter="url(#glow)"/>
  <path d="M0 980 C440 875 830 1010 1170 905 C1510 800 1740 825 2048 750 L2048 1152 L0 1152Z" fill="#ffffff" opacity=".025"/>

  <text x="48" y="76" class="font title">AI设计提效全链路规划</text>
  <text x="50" y="126" class="font muted">从人工串行交付，升级为 AI-native 的策略、生成、审验收与知识沉淀闭环</text>
  <rect x="1782" y="42" width="170" height="36" rx="18" fill="#ff0f23"/>
  <text x="1815" y="66" class="font label">JD DESIGN</text>

  <!-- Before -->
  <text x="50" y="204" class="font caption" fill="#828794">BEFORE</text>
  <text x="50" y="242" class="font small">传统人工 MANUAL</text>
  <g transform="translate(198,154)">
    <g filter="url(#shadow)">
      <path d="M0 0 H280 L300 44 L280 88 H0 Z" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="88" y="38" class="font node-title">需求对接</text><text x="112" y="68" class="font small">人工</text>
    </g>
    <g transform="translate(320,0)" filter="url(#shadow)">
      <path d="M0 0 H280 L300 44 L280 88 H0 Z" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="88" y="38" class="font node-title">设计方案</text><text x="112" y="68" class="font small">人工</text>
    </g>
    <g transform="translate(640,0)" filter="url(#shadow)">
      <path d="M0 0 H280 L300 44 L280 88 H0 Z" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="88" y="38" class="font node-title">设计延展</text><text x="112" y="68" class="font small">人工</text>
    </g>
    <g transform="translate(960,0)" filter="url(#shadow)">
      <path d="M0 0 H280 L300 44 L280 88 H0 Z" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="72" y="38" class="font node-title">设计审核串稿</text><text x="112" y="68" class="font small">人工</text>
    </g>
    <g transform="translate(1280,0)" filter="url(#shadow)">
      <path d="M0 0 H280 L300 44 L280 88 H0 Z" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="88" y="38" class="font node-title">设计修改</text><text x="112" y="68" class="font small">人工</text>
    </g>
    <g transform="translate(1600,0)" filter="url(#shadow)">
      <rect x="0" y="0" width="270" height="88" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.16)"/>
      <text x="82" y="38" class="font node-title">研发联调</text><text x="112" y="68" class="font small">人工</text>
    </g>
  </g>

  <!-- After labels -->
  <text x="50" y="334" class="font caption" fill="#ffffff">AFTER</text>
  <text x="50" y="374" class="font caption" fill="#c2c4cc">AI-NATIVE</text>
  <rect x="50" y="396" width="46" height="22" rx="3" class="chip-skill"/><text x="60" y="412" class="font label">SKILL</text>
  <rect x="106" y="396" width="48" height="22" rx="3" class="chip-work"/><text x="114" y="412" class="font label">工作流</text>
  <rect x="164" y="396" width="36" height="22" rx="3" class="chip-md"/><text x="173" y="412" class="font label">MD</text>

  <!-- Main stage panels -->
  <g transform="translate(198,274)" filter="url(#shadow)">
    <rect width="462" height="548" rx="12" fill="url(#panel)" stroke="#3d414d"/>
    <rect width="462" height="72" rx="12" fill="#ff0f23" opacity=".16"/>
    <circle cx="70" cy="36" r="18" fill="#ff0f23"/><text x="64" y="43" class="font label">1</text>
    <text x="104" y="44" class="font stage-title">设计前 · 提策略</text>
    <g transform="translate(18,96)">
      <rect width="426" height="116" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="150" y="28" class="font node-title">需求理解与策略提炼</text>
      <rect x="18" y="50" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="65" class="font label">SKILL</text><text x="78" y="65" class="font small">目标拆解与策略提炼</text>
      <rect x="18" y="82" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="97" class="font label">SKILL</text><text x="78" y="97" class="font small">竞品分析与机会洞察</text>
    </g>
    <g transform="translate(18,228)">
      <rect width="426" height="142" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="164" y="28" class="font node-title">深度分析与洞察</text>
      <rect x="18" y="52" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="67" class="font label">SKILL</text><text x="78" y="67" class="font small">竞品拆解分析</text>
      <rect x="18" y="86" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="101" class="font label">SKILL</text><text x="78" y="101" class="font small">用户 / 商家洞察</text>
      <rect x="18" y="120" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="135" class="font label">SKILL</text><text x="78" y="135" class="font small">数据分析洞察</text>
    </g>
    <g transform="translate(18,386)">
      <rect width="426" height="122" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
