      <rect width="516" height="154" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
      <text x="198" y="28" class="font node-title">内容与规范审核</text>
      <rect x="26" y="58" width="44" height="20" rx="3" class="chip-skill"/><text x="33" y="73" class="font label">SKILL</text><text x="88" y="73" class="font small">UI 验收</text>
      <rect x="274" y="58" width="44" height="20" rx="3" class="chip-skill"/><text x="281" y="73" class="font label">SKILL</text><text x="336" y="73" class="font small">规范自查</text>
      <rect x="26" y="112" width="44" height="20" rx="3" class="chip-skill"/><text x="33" y="127" class="font label">SKILL</text><text x="88" y="127" class="font small">资源 / 动效审核</text>
      <rect x="274" y="112" width="44" height="20" rx="3" class="chip-skill"/><text x="281" y="127" class="font label">SKILL</text><text x="336" y="127" class="font small">用户 / 专家审核</text>
    </g>
    <g transform="translate(18,270)">
