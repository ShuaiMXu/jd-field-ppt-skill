      <text x="200" y="28" class="font node-title">结果评估与优化</text>
      <rect x="26" y="70" width="44" height="20" rx="3" class="chip-skill"/><text x="33" y="85" class="font label">SKILL</text><text x="88" y="85" class="font small">设计评估分析</text>
      <rect x="274" y="70" width="44" height="20" rx="3" class="chip-skill"/><text x="281" y="85" class="font label">SKILL</text><text x="336" y="85" class="font small">效果归因分析</text>
    </g>
    <g transform="translate(18,414)">
