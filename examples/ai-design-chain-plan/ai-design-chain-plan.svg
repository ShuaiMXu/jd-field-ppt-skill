    <text x="22" y="48" class="font section">沉淀复用</text>
    <text x="22" y="84" class="font caption">知识库与设计体系</text>
    <rect x="22" y="120" width="36" height="22" rx="3" class="chip-md"/><text x="31" y="136" class="font label">MD</text>
    <g transform="translate(210,28)">
      <rect width="330" height="150" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.10)"/>
      <circle cx="58" cy="44" r="28" fill="url(#green)"/><text x="100" y="54" class="font stage-title">设计规范体系</text>
      <text x="32" y="104" class="font small">设计原则、色彩、字体、间距、</text><text x="32" y="132" class="font small">组件规范等沉淀输出</text>
    </g>
    <g transform="translate(570,28)">
      <rect width="330" height="150" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.10)"/>
      <circle cx="58" cy="44" r="28" fill="url(#green)"/><text x="100" y="54" class="font stage-title">视觉与素材资产库</text>
      <text x="32" y="104" class="font small">品牌视觉规范、组件库、图标库、</text><text x="32" y="132" class="font small">动效库、模板统一管理</text>
    </g>
    <g transform="translate(930,28)">
      <rect width="330" height="150" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.10)"/>
      <circle cx="58" cy="44" r="28" fill="url(#green)"/><text x="100" y="54" class="font stage-title">页面结构与模板体系</text>
      <text x="32" y="104" class="font small">频道页、列表页、详情页等</text><text x="32" y="132" class="font small">页面结构模板化沉淀</text>
    </g>
    <g transform="translate(1290,28)">
      <rect width="330" height="150" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.10)"/>
      <circle cx="58" cy="44" r="28" fill="url(#green)"/><text x="100" y="54" class="font stage-title">渠道与业务知识库</text>
      <text x="32" y="104" class="font small">频道规则、业务场景、运营策略、</text><text x="32" y="132" class="font small">搜索 / SUG / 资讯 / 商家</text>
    </g>
    <g transform="translate(1650,28)">
      <rect width="330" height="150" rx="8" fill="url(#card)" stroke="rgba(255,255,255,.10)"/>
      <circle cx="58" cy="44" r="28" fill="url(#green)"/><text x="100" y="54" class="font stage-title">本地生活全站知识库</text>
      <text x="32" y="104" class="font small">业务全链路知识沉淀、</text><text x="32" y="132" class="font small">经验复用与持续迭代</text>
    </g>
