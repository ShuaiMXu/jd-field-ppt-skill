  <!-- Legend -->
  <g transform="translate(610,1080)">
    <rect width="820" height="44" rx="22" fill="#141827" stroke="rgba(255,255,255,.12)"/>
    <rect x="28" y="12" width="48" height="22" rx="3" class="chip-skill"/><text x="36" y="28" class="font label">SKILL</text><text x="92" y="29" class="font small">AI 能力</text>
    <rect x="230" y="12" width="48" height="22" rx="3" class="chip-work"/><text x="238" y="28" class="font label">工作流</text><text x="294" y="29" class="font small">自动化工作流</text>
    <rect x="440" y="12" width="38" height="22" rx="3" class="chip-md"/><text x="449" y="28" class="font label">MD</text><text x="494" y="29" class="font small">沉淀资产 / 知识</text>
    <rect x="650" y="12" width="42" height="22" rx="3" class="chip-sop"/><text x="659" y="28" class="font label">SOP</text><text x="708" y="29" class="font small">规范流程</text>
  </g>
</svg>
