      <rect x="18" y="56" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="71" class="font label">SKILL</text><text x="78" y="71" class="font small">调研问卷生成</text>
      <rect x="18" y="90" width="44" height="20" rx="3" class="chip-skill"/><text x="25" y="105" class="font label">SKILL</text><text x="78" y="105" class="font small">用户反馈分析</text>
    </g>
