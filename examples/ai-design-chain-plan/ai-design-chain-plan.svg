    <circle cx="220" cy="36" r="18" fill="#ff0f23"/><text x="214" y="43" class="font label">2</text>
    <text x="256" y="44" class="font stage-title">设计中 · 出方案 &amp; 产素材</text>
    <g transform="translate(18,96)">
      <rect width="712" height="92" rx="8" fill="#ffffff" opacity=".05" stroke="rgba(255,255,255,.10)"/>
