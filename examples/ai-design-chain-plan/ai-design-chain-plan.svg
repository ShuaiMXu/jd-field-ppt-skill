      <text x="200" y="28" class="font node-title">研发适配与联调</text>
      <rect x="26" y="68" width="44" height="20" rx="3" class="chip-skill"/><text x="33" y="83" class="font label">SKILL</text><text x="88" y="83" class="font small">研发还原检测，输出差异与修复建议</text>
    </g>
  </g>

  <path d="M660 514 C672 514 672 514 684 514" stroke="#ff0f23" stroke-width="4" fill="none"/>
  <path d="M1418 514 C1430 514 1430 514 1442 514" stroke="#ff0f23" stroke-width="4" fill="none"/>
  <path d="M670 500 L690 514 L670 528 Z" fill="#ff0f23"/>
  <path d="M1428 500 L1448 514 L1428 528 Z" fill="#ff0f23"/>

  <!-- Foundations -->
  <g transform="translate(38,852)" filter="url(#shadow)">
